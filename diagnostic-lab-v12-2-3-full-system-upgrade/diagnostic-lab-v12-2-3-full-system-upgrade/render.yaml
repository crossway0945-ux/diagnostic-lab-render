services:
  - type: web
    name: diagnostic-lab-render
    runtime: node
    plan: starter
    region: singapore
    rootDir: diagnostic-lab-v12-2-3-full-system-upgrade
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: diagnostic-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22.16.0
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DIAGNOSTIC_STORAGE_ADAPTER
        value: local-json
      - key: DIAGNOSTIC_DATA_DIR
        value: /var/data
      - key: DIAGNOSTIC_REQUIRE_FULL_ENGINE
        value: "true"
      - key: DIAGNOSTIC_ANALYSIS_MODE
        value: sync
      - key: DIAGNOSTIC_ENABLE_NETLIFY_BLOBS
        value: "false"
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1/responses
      - key: OPENAI_MODEL
        value: gpt-5.1
      - key: OPENAI_TIMEOUT_MS
        value: "180000"
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "8000"
      - key: OPENAI_REASONING_EFFORT
        value: medium
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/diagnostic-lab-v12-2-3-full-system-upgrade/.cache/puppeteer
      - key: PDF_GENERATION_TIMEOUT_MS
        value: "110000"
      - key: PDF_BROWSER_LAUNCH_TIMEOUT_MS
        value: "45000"
      - key: PDF_PAGE_TIMEOUT_MS
        value: "60000"
      - key: OPENAI_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
