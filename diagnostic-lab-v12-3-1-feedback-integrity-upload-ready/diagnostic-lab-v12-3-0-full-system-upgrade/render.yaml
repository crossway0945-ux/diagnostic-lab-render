services:
  - type: web
    name: ielts-diagnostic-lab
    runtime: node
    plan: starter
    region: singapore
    rootDir: diagnostic-lab-v12-3-0-full-system-upgrade
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    disk:
      name: diagnostic-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22.16.0
      - key: HOST
        value: 0.0.0.0
      - key: DIAGNOSTIC_STORAGE_ADAPTER
        value: local-json
      - key: DIAGNOSTIC_DATA_DIR
        value: /var/data
      - key: DIAGNOSTIC_REQUIRE_FULL_ENGINE
        value: "true"
      - key: DIAGNOSTIC_ANALYSIS_MODE
        value: sync
      - key: DIAGNOSTIC_ENABLE_NETLIFY_BLOBS
        value: "false"
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1/responses
      - key: OPENAI_TIMEOUT_MS
        value: "180000"
      - key: OPENAI_MAX_OUTPUT_TOKENS
        value: "6000"
      - key: OPENAI_REASONING_EFFORT
        value: low
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
